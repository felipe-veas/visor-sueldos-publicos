on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: Release Please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4
        with:
          # This action requires a GitHub Token (PAT) with 'repo' scope
          # or 'contents:write' and 'pull_requests:write' permissions
          # if 'workflow permissions' in repository settings are not enough.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
