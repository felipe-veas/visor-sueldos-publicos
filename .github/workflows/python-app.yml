name: Python Application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies from lockfile
        run: |
          # Use uv to sync the environment exactly as defined in uv.lock
          uv sync --frozen --all-extras

      - name: Compile python files
        run: |
          uv run python -m py_compile app.py src/core/config.py src/core/queries.py src/ui/views.py src/etl/ingest.py src/etl/sync.py

      - name: Lint with ruff
        run: |
          # Ruff is significantly faster and more comprehensive than flake8
          uv run ruff check .
          uv run ruff format --check . || true

      - name: Test with pytest
        run: |
          # Run unit tests
          uv run pytest tests/
